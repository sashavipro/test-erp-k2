<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP System</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <!-- Client form -->
        <div class="card">
            <h2>Add Client</h2>
            <form hx-post="/api/clients/" hx-ext="json-enc" hx-on::after-request="if(event.detail.successful) location.reload()">
                <input type="text" name="name" placeholder="Name" required>
                <input type="email" name="email" placeholder="Email">
                <button type="submit">Create Client</button>
            </form>
            <h3>Clients</h3>
            <ul>
                {% for client in clients %}
                <li>{{ client.name }} ({{ client.email }})</li>
                {% endfor %}
            </ul>
        </div>

        <!-- Product form -->
        <div class="card">
            <h2>Add Product</h2>
            <form hx-post="/api/products/" hx-ext="json-enc" hx-on::after-request="if(event.detail.successful) location.reload()">
                <input type="text" name="name" placeholder="Product Name" required>
                <input type="number" step="0.01" name="price" placeholder="Price" required>
                <button type="submit">Create Product</button>
            </form>
            <h3>Products</h3>
            <ul>
                {% for product in products %}
                <li>{{ product.name }} - ${{ product.price }}</li>
                {% endfor %}
            </ul>
        </div>

        <!-- Order form -->
        <div class="card">
            <h2>Create Order</h2>
            <form id="orderForm">
                <select id="clientSelect" required>
                    <option value="">Select Client</option>
                    {% for client in clients %}
                    <option value="{{ client.id }}">{{ client.name }}</option>
                    {% endfor %}
                </select>
                <select id="productSelect" required>
                    <option value="">Select Product</option>
                    {% for product in products %}
                    <option value="{{ product.id }}">{{ product.name }} - ${{ product.price }}</option>
                    {% endfor %}
                </select>
                <input type="number" id="quantity" placeholder="Quantity" value="1" min="1" required>
                <button type="button" onclick="submitOrder()">Create Order</button>
            </form>
        </div>

        <!-- Check Orders form -->
        <div class="card">
            <h2>Check Client Orders</h2>
            <select id="checkClient" onchange="loadOrders()">
                <option value="">Select Client</option>
                {% for client in clients %}
                <option value="{{ client.id }}">{{ client.name }}</option>
                {% endfor %}
            </select>
            <div id="ordersList"></div>
        </div>
    </div>

    <!-- JSON extension for htmx -->
    <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"></script>

    <script src="/static/js/script.js"></script>
</body>
</html>
